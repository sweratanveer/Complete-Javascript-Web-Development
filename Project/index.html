<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
     <div class="msg_container hide">
        <p id="msg">Winner</p>
        <button10 id = "new-button">New Game </button10>
    </div>
    <main>
        <h1>Tic Tac Toe Game </h1>
        <div class="container">
            <div class="game">
                <button1 class="Box"></button1>
                <button2 class="Box"></button2>
                <button3 class="Box"></button3>
                <button4 class="Box"></button4>
                <button5 class="Box"></button5>
                <button6 class="Box"></button6>
                <button7 class="Box"></button7>
                <button8 class="Box"></button8>
                <button9 class="Box"></button9>
            </div>
        </div>
        <button id = "reset-button">Reset Game </button>
    </main>
     
    <script src="app.js"></script>
</body>

</html>
